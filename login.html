<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Paruchuru Chanikya</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg, #0f172a);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 18px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 1.8rem;
        }

        .login-box p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 26px;
            font-size: .9rem;
        }

        .login-box .input-box {
            width: 100%;
            margin-bottom: 16px;
        }

        .login-box .btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
        }

        .login-status {
            text-align: center;
            margin-top: 14px;
            font-size: .9rem;
            min-height: 20px;
        }

        .login-back {
            text-align: center;
            margin-top: 18px;
            font-size: .85rem;
        }

        .login-back a {
            color: #38bdf8;
        }
    </style>
</head>

<body class="login-page">

    <section class="login-section">
        <div class="login-box">
            <h2>CHANIKYA</h2>
            <p class="subtitle">Admin Portal — Please sign in</p>

            <form id="login-form" method="POST" action="backend/auth/login.php">
                <input
                    type="text"
                    name="username"
                    class="input-box"
                    placeholder="Username"
                    required
                    autocomplete="username">

                <input
                    type="password"
                    name="password"
                    class="input-box"
                    placeholder="Password"
                    required
                    autocomplete="current-password">

                <button type="submit" class="btn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <p id="login-status" class="login-status"></p>
            </form>

            <div class="login-back">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </section>

    <script>
        const form = document.getElementById("login-form");
        const status = document.getElementById("login-status");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            status.style.color = "#38bdf8";
            status.textContent = "⏳ Signing in...";

            const formData = new FormData(form);

            try {
                const response = await fetch(form.action, {
                    method: "POST",
                    headers: { "Accept": "application/json" },
                    body: formData,
                    redirect: "manual"
                });

                // On success PHP redirects to admin/dashboard.php
                if (response.type === "opaqueredirect" || response.redirected || response.status === 302 || response.status === 0) {
                    window.location.href = "admin/dashboard.php";
                    return;
                }

                let data = {};
                try {
                    data = await response.json();
                } catch (_) {}

                if (data.success) {
                    window.location.href = data.redirect || "admin/dashboard.php";
                } else {
                    status.style.color = "#ef4444";
                    status.textContent = data.message || "❌ Invalid username or password.";
                }
            } catch (error) {
                // Network-level redirect (opaque) still means success here
                window.location.href = "admin/dashboard.php";
            }
        });
    </script>

</body>

</html>
